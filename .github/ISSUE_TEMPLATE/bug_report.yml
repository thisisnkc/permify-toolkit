name: Bug Report
description: Report a bug in permify-toolkit
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in the details below so we can reproduce and fix it quickly.

  - type: dropdown
    id: package
    attributes:
      label: Affected Package
      options:
        - "@permify-toolkit/core"
        - "@permify-toolkit/nestjs"
        - "@permify-toolkit/cli"
        - Multiple / unsure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: "e.g. 1.2.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproduction
      description: Code snippet or steps to reproduce the issue.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - Node version (`node -v`)
        - pnpm version (`pnpm -v`)
        - Permify server version (if relevant)
      render: shell
    validations:
      required: false
